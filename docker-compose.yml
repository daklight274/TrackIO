version: "3.9"
services:
   mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_track_io
    restart: unless-stopped
    ports:
      - "2002:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "@??Anhquang4mat2002??@"   # min 8 ký tự, có chữ hoa + số + ký tự đặc biệt
      MSSQL_PID: "Developer"                    # bản miễn phí, không dùng production
    volumes:
      - mssql_data_track_io:/var/opt/mssql 
      
      
volumes:
  mssql_data_track_io: